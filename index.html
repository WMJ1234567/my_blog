<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>我的技术博客</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="site">
    <nav class="nav">
      <div class="brand">MyTech</div>
      <ul class="menu">
        <li><a href="index.html" class="active">首页</a></li>
        <li><a href="resume.html">简历</a></li>
        <li><a href="bookmarks.html">收藏</a></li>
        <li><a href="#" id="theme-toggle">切换主题</a></li>
      </ul>
    </nav>

    <header class="hero">
      <div class="hero-inner">
        <div class="hero-left">
          <div id="animalPlayground" style="width:100%;height:220px;position:relative"></div>
        </div>
        <div class="hero-side">
          <div id="clockBox" class="card clock-box" aria-live="polite">
            <table>
              <tr><th>当前时间</th><td id="clockTime">--:--:--</td></tr>
              <tr><th>日期</th><td id="clockDate">----</td></tr>
              <tr><th>星期</th><td id="clockWeek">-</td></tr>
              <tr><th>时区</th><td id="clockZone">-</td></tr>
            </table>
          </div>

          <div id="headlineBox" class="card headline-box" aria-live="polite">
            <div class="headline-title">今日头条 — <span id="headlineWeek">星期-</span></div>
            <div id="headlineListWrap" class="headline-list-wrap"></div>
          </div>
        </div>
      </div>
      <div class="hero-deco">
        <img src="icons/github.svg" alt="icon" style="opacity:0.18">
      </div>
    </header>

    <main class="content">
      <section class="posts">
        <!-- homepage intentionally minimal and visual-only -->
      </section>
    </main>

    <footer class="foot">© 2026 MyTech — 由静态页面驱动</footer>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
